# ======================================================== 
# MyBatis-Plus 配置
# ======================================================== 

spring:
  # 数据源配置
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/seckill_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    hikari:
      pool-name: SeckillHikariPool
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      keepalive-time: 60000

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      # password: 
      database: 0
      timeout: 10s
      lettuce:
        pool:
          max-active: 50
          max-idle: 30
          min-idle: 10
          max-wait: 3s

  # RabbitMQ 配置
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123
    virtual-host: /
    # 连接超时时间（毫秒）
    connection-timeout: 15000
    # 消息确认机制
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 10
        max-concurrency: 30
        prefetch: 20

# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类包扫描路径
  type-aliases-package: com.seckill.**.entity
  configuration:
    # 开启驼峰命名自动转换
    map-underscore-to-camel-case: true
    # 开启 SQL 日志打印
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 缓存开启
    cache-enabled: true
    # 懒加载开启
    lazy-loading-enabled: true
    # 积极加载关闭
    aggressive-lazy-loading: false
  global-config:
    db-config:
      # 逻辑删除字段名
      logic-delete-field: deleted
      # 逻辑删除值（已删除）
      logic-delete-value: 1
      # 逻辑未删除值（未删除）
      logic-not-delete-value: 0
      # ID 生成策略
      id-type: assign_id
      # 表名前缀
      table-prefix: t_
