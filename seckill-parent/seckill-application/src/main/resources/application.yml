# ======================================================== 
# Spring Boot 主配置文件
# ======================================================== 

spring:
  profiles:
    active: dev

  # 导入基础设施配置
  config:
    import: classpath:application-infrastructure.yml

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /

# 日志配置
logging:
  level:
    root: info
    com.seckill: debug
    org.springframework.web: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
