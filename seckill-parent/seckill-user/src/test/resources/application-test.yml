# 测试环境配置
spring:
  application:
    name: seckill-user-test

  # H2 内存数据库配置
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Console 配置（测试环境可访问）
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  # Redis 配置（使用嵌入式或模拟）
  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置（测试用密钥）
jwt:
  secret: test-secret-key-for-jwt-signing-in-test-environment-only
  access-token-expiration: 1800000  # 30分钟
  refresh-token-expiration: 604800000  # 7天

# 日志配置
logging:
  level:
    com.seckill.user: DEBUG
    org.springframework.web: DEBUG
