# Redis 配置文件

# 绑定地址（允许所有IP访问）
bind 0.0.0.0

# 端口
port 6379

# 保护模式
daemonize no

# 日志级别
loglevel notice

# 数据持久化目录
dir /data

# RDB 持久化配置
save 900 1
save 300 10
save 60 10000

# RDB 文件名
dbfilename dump.rdb

# AOF 持久化配置
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 最大内存限制
maxmemory 256mb
maxmemory-policy allkeys-lru

# 密码认证（开发环境不设置）
# requirepass your_password

# 客户端连接超时
timeout 300

# TCP 连接保活
tcp-keepalive 300
